server:
  port: 8080

spring:
  application:
    name: dsa-visualizer-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dsa_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: 403f82de19504c5e3d7a8e7b6d5c4b3a2a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
    expirationMs: 86400000 # 24 Hours
    refreshExpirationMs: 604800000 # 7 Days

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
